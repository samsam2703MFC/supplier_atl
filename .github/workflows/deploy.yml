name: Deploy to server (SSH / rsync)

# Mirrors back_office_ws_franchisee's deploy: password SSH auth (sshpass)
# + rsync WITHOUT --delete, so nothing else on the server is wiped.
#
# Build: Composer dependencies are installed on the runner (the server has no
# Composer) and vendor/ IS deployed. .env and logs/ are excluded so the
# server's secrets/logs are left intact. Twig cache is off, so updated
# templates/CSS go live on the next request.
#
# The app reads its config from .env ($_ENV[...] in config/app.php); that file
# is NOT in the repo — create it once on the server at <DEPLOY_DIR>/.env
# (sibling of vendor/). public/index.php loads it via Dotenv safeLoad().
#
# Secrets (same as back_office_ws_franchisee — copy the same values):
#   SSH_HOST · SSH_USER · SSH_PASSWORD
# Vars:
#   SSH_PORT    SSH port (default 22)
#   DEPLOY_DIR  absolute server dir = the APP ROOT that contains public/ and
#               src/ (the folder Apache serves /supplier from, via an Alias to
#               its public/ subdir). Default: /var/www/html/supplier

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.1 (matches the server)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, mbstring
          tools: composer:v2

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare remote directory (validates SSH login + shows layout)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'REMOTE'
          DIR="${{ vars.DEPLOY_DIR || '/var/www/html/supplier' }}"
          echo "== current contents of $DIR =="
          ls -la "$DIR" 2>/dev/null || echo "(does not exist yet — will be created)"
          mkdir -p "$DIR"
          command -v rsync >/dev/null || { echo 'rsync missing on server — apt-get install -y rsync'; exit 1; }
          REMOTE

      - name: Deploy → ${{ vars.DEPLOY_DIR || '/var/www/html/supplier' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -rltDz --omit-dir-times \
            --exclude '.git' --exclude '.github' --exclude '.idea' \
            --exclude 'node_modules' \
            --exclude '.env' --exclude '.env.*' --exclude 'logs' --exclude '*.log' \
            -e "ssh -p ${{ vars.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_DIR || '/var/www/html/supplier' }}/"

      - name: Verify app files + dependencies landed on the server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'REMOTE'
          DIR="${{ vars.DEPLOY_DIR || '/var/www/html/supplier' }}"
          fail=0
          for f in \
            "vendor/autoload.php" \
            "public/index.php" \
            "public/assets/css/design-system.css" \
            "public/assets/css/components/sidebar.css" \
            "src/app/Views/page_components/sidebar.twig" \
            "src/app/Views/price_list/index.twig"; do
            if [ -e "$DIR/$f" ]; then echo "  OK  $f"; else echo "  MISSING  $f"; fail=1; fi
          done
          if [ ! -f "$DIR/.env" ]; then
            echo "  NOTE: $DIR/.env is absent — create it (the app reads config from it)."
          fi
          [ "$fail" = "0" ] && echo "ALL APP FILES + VENDOR PRESENT" || { echo "SOME FILES MISSING — check DEPLOY_DIR"; exit 1; }
          REMOTE

      - name: Probe what the server actually SERVES (diagnostic, non-fatal)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'REMOTE'
          DIR="${{ vars.DEPLOY_DIR || '/var/www/html/supplier' }}"
          BASE="http://localhost/supplier"
          echo "===== 1. app root (follow redirects) ====="
          curl -s -o /dev/null -w "  code=%{http_code}  final=%{url_effective}\n" -L "$BASE/" || echo "  (curl failed)"
          echo "===== 2. CSS asset HTTP status at the SERVED urls ====="
          for a in assets/css/bootstrap.css assets/css/app.css \
                   assets/css/design-system.css assets/css/components/sidebar.css \
                   assets/css/pages/price_list.css; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/$a")
            echo "  $code  $a"
          done
          echo "===== 3. served root HTML signals ====="
          H=$(curl -s -L "$BASE/")
          echo "  ROOT resolved in HTML:   $(printf '%s' "$H" | grep -oE 'https?://[^\"]+/supplier' | head -1)"
          echo "  links design-system.css: $(printf '%s' "$H" | grep -c 'design-system.css')"
          echo "  uses ds-side classes:    $(printf '%s' "$H" | grep -c 'ds-side')"
          echo "  <title>:                 $(printf '%s' "$H" | grep -oiE '<title>[^<]*' | head -1)"
          echo "===== 4. disk: CSS actually present in public/assets/css ====="
          ls -la "$DIR/public/assets/css/" 2>&1 | head -20
          echo "  -- design-system.css head --"; head -3 "$DIR/public/assets/css/design-system.css" 2>&1
          echo "===== 5. Apache mapping for /supplier (if readable) ====="
          grep -rniE "supplier|Alias|DocumentRoot" /etc/apache2/sites-enabled/ /etc/apache2/conf-enabled/ /etc/httpd/conf.d/ /etc/apache2/apache2.conf 2>/dev/null | head -20 || echo "  (apache config not readable by this user)"
          echo "===== done ====="
          REMOTE
