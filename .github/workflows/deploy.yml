# Deploy the supplier app to the production server over SSH.
#
# What it does: connects to the server and updates the checked-out git repo
# to the latest `master` (fetch + hard reset). Because vendor/, .env and
# logs/ are gitignored, a hard reset never touches dependencies or secrets,
# and Twig runs with cache disabled so template/CSS changes go live on the
# next request — no build or cache-clear step is required.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST      server host/IP        e.g. 185.180.206.46
#   SSH_USER      SSH user              e.g. deploy
#   SSH_PASSWORD  SSH password          password for SSH_USER on the server
#   DEPLOY_PATH   app root on disk      filesystem path of the git checkout
#                                       (optional; auto-detected when unset by
#                                       locating the thaizu/supplier composer.json)
#   SSH_PORT      SSH port              (optional; defaults to 22)
#
# Server prerequisites (one-time): the app directory is a git clone of this
# repo with `origin` pointing at it and credentials (deploy key or the repo is
# accessible) allowing `git fetch`.

name: Deploy to server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy /supplier
    runs-on: ubuntu-latest
    steps:
      - name: Update server to latest master
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            # Resolve the app's git checkout. Prefer the DEPLOY_PATH secret when
            # set; otherwise auto-detect by locating the composer.json that
            # declares this project ("thaizu/supplier").
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR/.git" ]; then
              APP_DIR="$(grep -rls --include=composer.json 'thaizu/supplier' \
                          /var/www /home /srv /usr/share/nginx 2>/dev/null \
                          | head -n1 | xargs -r dirname || true)"
            fi
            if [ -z "$APP_DIR" ] || [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: could not locate the supplier git checkout on the server." >&2
              echo "Set the DEPLOY_PATH secret to the directory containing composer.json." >&2
              exit 1
            fi

            cd "$APP_DIR"
            echo "App dir: $APP_DIR"
            echo "Before: $(git rev-parse --short HEAD)"
            git fetch origin master --prune
            git reset --hard origin/master
            echo "After:  $(git rev-parse --short HEAD)"
