# Deploy the supplier app to the production server over SSH.
#
# What it does: connects to the server and updates the checked-out git repo
# to the latest `master` (fetch + hard reset). Because vendor/, .env and
# logs/ are gitignored, a hard reset never touches dependencies or secrets,
# and Twig runs with cache disabled so template/CSS changes go live on the
# next request — no build or cache-clear step is required.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     server host/IP        e.g. 185.180.206.46
#   DEPLOY_USER     SSH user              e.g. deploy
#   DEPLOY_KEY_B64  the SSH PRIVATE key, in EITHER form:
#                     • the raw key file, pasted whole (BEGIN/END lines incl.), OR
#                     • its base64, one line:  base64 -w0 deploy_key
#                       (macOS:  base64 -i deploy_key | tr -d '\n')
#                   (its public half must be in the server user's authorized_keys)
#   DEPLOY_PATH     app root on disk      filesystem path served at /supplier/
#                                         (optional; defaults to /var/www/supplier)
#   DEPLOY_PORT     SSH port              (optional; defaults to 22)
#
# Server prerequisite (one-time): the app directory is a git clone of this
# repo with `origin` set and credentials allowing `git fetch`.

name: Deploy to server

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy /supplier
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/supplier' }}
      DEPLOY_KEY_B64: ${{ secrets.DEPLOY_KEY_B64 }}
    steps:
      - name: Update server to latest master
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_KEY_B64:-}" ]; then
            echo "::error::DEPLOY_KEY_B64 secret is empty."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Accept EITHER a raw PEM private key pasted whole, OR a base64 blob.
          if printf '%s' "$DEPLOY_KEY_B64" | grep -q 'PRIVATE KEY'; then
            printf '%s\n' "$DEPLOY_KEY_B64" > ~/.ssh/deploy_key
          else
            printf '%s' "$DEPLOY_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key 2>/dev/null || true
          fi
          chmod 600 ~/.ssh/deploy_key

          # Fail early with a clear message if we couldn't get a usable key.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_KEY_B64 is not a usable SSH private key. Paste EITHER the raw private key file (BEGIN/END lines included) OR its base64 (base64 -w0 deploy_key)."
            exit 1
          fi

          # Trust the host key on first contact.
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              -o ConnectTimeout=20 \
              -o StrictHostKeyChecking=accept-new \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -eu; cd \"$DEPLOY_PATH\"; echo \"Before: \$(git rev-parse --short HEAD)\"; git fetch origin master --prune; git reset --hard origin/master; echo \"After:  \$(git rev-parse --short HEAD)\""
